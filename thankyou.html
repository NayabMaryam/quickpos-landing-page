<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent – BrewDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --espresso: #2c1a0e; --cream: #f4f1eb; --border: #e2d9ce;
      --sage: #5a7a5a; --sage-light: #eef3ee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream); color: var(--espresso);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 16px; padding: 3.5rem 3rem;
      text-align: center; max-width: 440px; width: 100%;
      animation: appear 0.4s ease both;
    }
    .icon-wrap {
      width: 56px; height: 56px; background: var(--sage-light);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 1.4rem;
    }
    h1 {
      font-family: 'Lora', serif; font-size: 1.8rem;
      font-weight: 600; margin-bottom: 0.75rem;
    }
    p {
      color: #6b5a4e; font-size: 0.9rem;
      line-height: 1.65; margin-bottom: 2rem;
    }
    a {
      display: inline-block; padding: 0.75rem 1.8rem;
      background: var(--espresso); color: #fff;
      border-radius: 9px; font-size: 0.88rem;
      font-weight: 500; transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    @keyframes appear {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">☕</div>
    <h1>Message received!</h1>
    <p>Thanks for reaching out. Our team (all former café owners) will get back to you within a few hours.</p>
    <a href="index.php">← Back to BrewDesk</a>
  </div>
</body>
</html>
